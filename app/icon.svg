<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1a56db"/>
  <!-- Metro train body -->
  <rect x="6" y="11" width="20" height="11" rx="3" fill="white"/>
  <!-- Windows -->
  <rect x="8" y="13" width="5" height="4" rx="1" fill="#1a56db"/>
  <rect x="14.5" y="13" width="5" height="4" rx="1" fill="#1a56db"/>
  <!-- Door line -->
  <line x1="13.5" y1="11" x2="13.5" y2="22" stroke="#1a56db" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="10" cy="23" r="2" fill="#1a56db"/>
  <circle cx="22" cy="23" r="2" fill="#1a56db"/>
  <!-- Track -->
  <line x1="4" y1="25" x2="28" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
